<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Robotic Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:25px;
    background:#081028;
    color:#E2E8F0;
    font-family:Segoe UI,Arial;
}

h2{
    margin-bottom:25px;
    font-size:38px;
    font-weight:700;
}

.filter-box{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

select{
    background:#101C3A;
    color:white;
    border:1px solid #22345E;
    border-radius:12px;
    padding:12px 16px;
    font-size:14px;
}

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.card{
    background:linear-gradient(145deg,#0E1B3D,#08152F);
    border:1px solid #1E325C;
    border-radius:22px;
    padding:22px;
    display:flex;
    align-items:center;
    gap:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.icon{
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
}

.green{
    background:linear-gradient(#16A34A,#15803D);
}

.orange{
    background:linear-gradient(#F59E0B,#D97706);
}

.red{
    background:linear-gradient(#EF4444,#DC2626);
}

.blue{
    background:linear-gradient(#3B82F6,#2563EB);
}

.card-title{
    color:#CBD5E1;
    font-size:15px;
    margin-bottom:5px;
}

.card-value{
    font-size:42px;
    font-weight:700;
}

.chart-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.chart-box{
    background:linear-gradient(145deg,#0E1B3D,#08152F);
    border:1px solid #1E325C;
    border-radius:22px;
    padding:22px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.chart-title{
    margin-bottom:15px;
    font-size:22px;
    font-weight:700;
}

canvas{
    width:100% !important;
}

.pie-wrapper{
    width:320px;
    margin:auto;
}

.issue-table{
    width:100%;
    border-collapse:collapse;
}

.issue-table th{
    text-align:left;
    padding:14px;
    color:#CBD5E1;
    border-bottom:1px solid #1E325C;
}

.issue-table td{
    padding:14px;
    border-bottom:1px solid #16274B;
}

.badge{
    background:#13254A;
    padding:8px 14px;
    border-radius:10px;
    color:#FF6B6B;
    font-weight:bold;
    display:inline-block;
    min-width:60px;
    text-align:center;
}

.bottom-chart{
    margin-top:25px;
}

@media(max-width:900px){

    .chart-grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<h2>📊 Robotic Dashboard</h2>

<div class="filter-box">

    <select id="yearFilter">
        <option value="ALL">Year : ALL</option>
    </select>

    <select id="dateFilter">
        <option value="ALL">Date : ALL</option>
    </select>

    <select id="groupFilter">
        <option value="ALL">Group : ALL</option>
    </select>

</div>

<!-- KPI -->
<div id="cards" class="card-container"></div>

<!-- TOP -->
<div class="chart-grid">

    <!-- PIE -->
    <div class="chart-box">

        <div class="chart-title">
            Status Distribution
        </div>

        <div class="pie-wrapper">
            <canvas id="pieChart"></canvas>
        </div>

    </div>

    <!-- CHANNEL -->
    <div class="chart-box">

        <div class="chart-title">
            Channel Summary
        </div>

        <canvas id="statusChart" height="220"></canvas>

    </div>

</div>

<!-- ISSUE -->
<div class="chart-box">

    <div class="chart-title">
        Human / System Error Issues
    </div>

    <table class="issue-table">

        <thead>
            <tr>
                <th>Issue</th>
                <th width="120">Count</th>
            </tr>
        </thead>

        <tbody id="issueTable"></tbody>

    </table>

</div>

<!-- GROUP CHART -->
<div class="chart-box bottom-chart">

    <div class="chart-title">
        Group Work Summary
    </div>

    <canvas id="groupChart" height="120"></canvas>

</div>

<script>

// ===================================
// LOAD FILE
// ===================================
function fetchLocal(url){

    return new Promise((resolve,reject)=>{

        let xhr = new XMLHttpRequest();

        xhr.open("GET",url);

        xhr.onload=()=>{

            if(xhr.status===200 || xhr.status===0){
                resolve(xhr.responseText);
            }
            else{
                reject(url);
            }

        };

        xhr.onerror=()=>reject(url);

        xhr.send();

    });

}

let allData=[];

let pieChart;
let statusChart;
let groupChart;

// ===================================
// LOAD FILE LIST
// ===================================
fetchLocal("filelist.json")

.then(text=>{

    let files=JSON.parse(text);

    loadFiles(files);

})

.catch(err=>{

    console.error(err);

    alert("โหลด filelist.json ไม่ได้");

});

// ===================================
// LOAD CSV
// ===================================
async function loadFiles(files){

    for(let file of files){

        try{

            let text=await fetchLocal(file);

            let parsed=Papa.parse(text,{
                header:false,
                skipEmptyLines:true
            });

            parsed.data.forEach(row=>{

                // GROUP
                let group=row[1] || "Unknown";

                // ===================================
                // CHANNEL จาก COLUMN H
                // ===================================
                let hCol=row[7] || "";

                let channel="";

                let splitH = hCol.split("^");

                for(let item of splitH){

                    item = item.trim();

                    // ข้ามค่าว่าง
                    if(item===""){
                        continue;
                    }

                    // ข้าม UUID
                    if(item.match(/^[0-9a-fA-F-]{20,}$/i)){
                        continue;
                    }

                    // ข้ามเบอร์โทร
                    if(item.match(/^\d{8,}$/)){
                        continue;
                    }

                    // ข้าม TXT_
                    if(item.includes("TXT_")){
                        continue;
                    }

                    // ข้ามวันที่
                    if(item.match(/^\d{2}_\d{2}_\d{2}$/)){
                        continue;
                    }

                    // ข้ามรหัสยาว
                    if(item.match(/^[A-Z0-9]{8,}$/)){
                        continue;
                    }

                    // ต้องมีตัวอักษร
                    if(!item.match(/[a-zA-Z]/)){
                        continue;
                    }

                    // ข้าม username
                    if(
                        item.toLowerCase().includes("admin") ||
                        item.toLowerCase().includes("user")
                    ){
                        continue;
                    }

                    // ใช้เป็น Channel
                    channel = item;

                    break;

                }

                // ===================================
                // STATUS + ISSUE จาก COLUMN R
                // ===================================
                let rCol=row[17] || "";

                let parts=rCol.split("@");

                let status=parts[2] || "UNKNOWN";
                let issue=parts[7] || "UNKNOWN";

                let dateMatch=
                    file.match(/\d{4}-\d{2}-\d{2}/);

                if(!dateMatch) return;

                allData.push({

                    Group:group,
                    Channel:channel,
                    Status:status,
                    Issue:issue,
                    Date:dateMatch[0],
                    Year:dateMatch[0].substring(0,4)

                });

            });

        }
        catch(err){

            console.error(err);

        }

    }

    initFilters();

    updateDashboard();

}

// ===================================
// FILTERS
// ===================================
function initFilters(){

    let years=[
        ...new Set(allData.map(x=>x.Year))
    ];

    let dates=[
        ...new Set(allData.map(x=>x.Date))
    ];

    let groups=[
        ...new Set(allData.map(x=>x.Group))
    ];

    years.sort();
    dates.sort();
    groups.sort();

    years.forEach(x=>{
        yearFilter.add(new Option(x,x));
    });

    dates.forEach(x=>{
        dateFilter.add(new Option(x,x));
    });

    groups.forEach(x=>{
        groupFilter.add(new Option(x,x));
    });

}

// ===================================
// UPDATE DASHBOARD
// ===================================
function updateDashboard(){

    let y=yearFilter.value;
    let d=dateFilter.value;
    let g=groupFilter.value;

    let data=allData.filter(x=>

        (y==="ALL" || x.Year===y) &&
        (d==="ALL" || x.Date===d) &&
        (g==="ALL" || x.Group===g)

    );

    // ===================================
    // KPI
    // ===================================
    let total=data.length;

    let robotSuccess=
        data.filter(x=>
            x.Status==="ROBOT_SUCCESS"
        ).length;

    let humanError=
        data.filter(x=>
            x.Status==="HUMAN_ERROR"
        ).length;

    let systemError=
        data.filter(x=>
            x.Status==="SYSTEM_ERROR"
        ).length;

    document.getElementById("cards").innerHTML=`

        <div class="card">
            <div class="icon blue">📦</div>
            <div>
                <div class="card-title">TOTAL</div>
                <div class="card-value">${total}</div>
            </div>
        </div>

        <div class="card">
            <div class="icon green">✓</div>
            <div>
                <div class="card-title">ROBOT_SUCCESS</div>
                <div class="card-value">${robotSuccess}</div>
            </div>
        </div>

        <div class="card">
            <div class="icon orange">👤</div>
            <div>
                <div class="card-title">HUMAN_ERROR</div>
                <div class="card-value">${humanError}</div>
            </div>
        </div>

        <div class="card">
            <div class="icon red">⚙</div>
            <div>
                <div class="card-title">SYSTEM_ERROR</div>
                <div class="card-value">${systemError}</div>
            </div>
        </div>

    `;

    // ===================================
    // STATUS PIE
    // ===================================
    let pieMap={};

    data.forEach(x=>{

        if(!pieMap[x.Status]){
            pieMap[x.Status]=0;
        }

        pieMap[x.Status]++;

    });

    if(pieChart){
        pieChart.destroy();
    }

    pieChart=new Chart(
        document.getElementById("pieChart"),
        {
            type:"doughnut",

            data:{
                labels:Object.keys(pieMap),

                datasets:[{
                    data:Object.values(pieMap),

                    backgroundColor:[
                        "#22C55E",
                        "#F59E0B",
                        "#EF4444",
                        "#3B82F6"
                    ]
                }]
            },

            options:{
                plugins:{
                    legend:{
                        position:"bottom",
                        labels:{
                            color:"#E2E8F0"
                        }
                    }
                },
                cutout:"65%"
            }
        }
    );

    // ===================================
    // CHANNEL MAP
    // ===================================
    let channelMap={};

    data.forEach(x=>{

        if(
            x.Channel==="Unknown" ||
            x.Channel==="UNKNOWN" ||
            x.Channel.trim()==="" ||
            x.Channel.match(/^\d+$/)
        ){
            return;
        }

        if(!channelMap[x.Channel]){
            channelMap[x.Channel]=0;
        }

        channelMap[x.Channel]++;

    });

    // ===================================
    // CHANNEL CHART
    // ===================================
    if(statusChart){
        statusChart.destroy();
    }

    statusChart=new Chart(
        document.getElementById("statusChart"),
        {
            type:"bar",

            data:{
                labels:Object.keys(channelMap),

                datasets:[{
                    data:Object.values(channelMap),

                    borderRadius:14,

                    backgroundColor:[
                        "#38BDF8",
                        "#818CF8",
                        "#F472B6",
                        "#22C55E",
                        "#F59E0B",
                        "#EF4444"
                    ]
                }]
            },

            options:{

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{

                    x:{
                        ticks:{
                            color:"#CBD5E1"
                        },
                        grid:{
                            display:false
                        }
                    },

                    y:{
                        ticks:{
                            color:"#CBD5E1"
                        },
                        grid:{
                            color:"#1E325C"
                        }
                    }

                }

            }

        }

    );

    // ===================================
    // ISSUE TABLE
    // ===================================
    let issueMap={};

    data.forEach(x=>{

        if(
            x.Status!=="HUMAN_ERROR" &&
            x.Status!=="SYSTEM_ERROR"
        ){
            return;
        }

        if(!issueMap[x.Issue]){
            issueMap[x.Issue]=0;
        }

        issueMap[x.Issue]++;

    });

    let html="";

    Object.entries(issueMap)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([issue,count])=>{

        html+=`

            <tr>
                <td>${issue}</td>
                <td>
                    <span class="badge">
                        ${count}
                    </span>
                </td>
            </tr>

        `;

    });

    document.getElementById("issueTable").innerHTML=html;

    // ===================================
    // GROUP CHART
    // ===================================
    let groupMap={};

    data.forEach(x=>{

        if(!groupMap[x.Group]){
            groupMap[x.Group]=0;
        }

        groupMap[x.Group]++;

    });

    if(groupChart){
        groupChart.destroy();
    }

    groupChart=new Chart(
        document.getElementById("groupChart"),
        {
            type:"line",

            data:{
                labels:Object.keys(groupMap),

                datasets:[{

                    label:"Work Count",

                    data:Object.values(groupMap),

                    borderColor:"#38BDF8",

                    backgroundColor:"rgba(56,189,248,0.2)",

                    tension:0.4,

                    fill:true,

                    pointRadius:5,

                    pointBackgroundColor:"#38BDF8"

                }]
            },

            options:{

                plugins:{
                    legend:{
                        display:false
                    }
                },

                scales:{

                    x:{
                        ticks:{
                            color:"#CBD5E1"
                        },
                        grid:{
                            display:false
                        }
                    },

                    y:{
                        ticks:{
                            color:"#CBD5E1"
                        },
                        grid:{
                            color:"#1E325C"
                        }
                    }

                }

            }

        }

    );

}

yearFilter.onchange=updateDashboard;
dateFilter.onchange=updateDashboard;
groupFilter.onchange=updateDashboard;

</script>

</body>
</html>
